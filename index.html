<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>17025 Quest</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f3ff;min-height:100vh;display:flex;justify-content:center;padding:1rem}
#app{width:100%;max-width:480px;background:#fff;border-radius:20px;padding:1.5rem;min-height:98vh;box-shadow:0 4px 24px rgba(83,74,183,.1)}
.screen{display:none}.screen.active{display:block}
h1{font-size:2rem;font-weight:700;color:#534AB7}
h1 span{color:#D4537E}
.tagline{font-size:13px;color:#888;margin-top:6px}
.auth-wrap{padding:2rem 0}
.auth-header{text-align:center;margin-bottom:2rem}
.tab-row{display:flex;margin-bottom:1.5rem;border:1.5px solid #E8E6F8;border-radius:12px;overflow:hidden}
.tab-btn{flex:1;padding:10px;background:transparent;border:none;font-size:14px;cursor:pointer;color:#888;font-weight:600}
.tab-btn.active{background:#534AB7;color:#fff}
.field{margin-bottom:1rem}
.field label{display:block;font-size:12px;color:#5F5E5A;font-weight:600;margin-bottom:4px}
.field input{width:100%;padding:12px 14px;border:1.5px solid #E8E6F8;border-radius:10px;font-size:14px;outline:none;transition:border-color .15s}
.field input:focus{border-color:#7F77DD}
.btn-primary{display:block;background:#534AB7;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:.5rem;transition:background .15s}
.btn-primary:hover{background:#3C3489}
.auth-msg{font-size:13px;text-align:center;margin-top:1rem;min-height:20px}
.auth-msg.error{color:#A32D2D}.auth-msg.success{color:#27500A}
.home-header{text-align:center;padding:1.5rem 0 1rem}
.user-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1.5px solid #F1EFE8}
.user-name{font-size:13px;color:#5F5E5A;font-weight:600}
.nav-row{display:flex;gap:8px;margin-bottom:1.25rem}
.nav-btn{flex:1;padding:8px;background:#F5F3FF;border:1.5px solid #E8E6F8;border-radius:10px;font-size:13px;font-weight:600;color:#534AB7;cursor:pointer;transition:all .15s}
.nav-btn.active{background:#534AB7;color:#fff;border-color:#534AB7}
.nav-btn:hover:not(.active){background:#EEEDFE}
.logout-btn{font-size:12px;color:#888;background:none;border:1px solid #E8E6F8;border-radius:8px;padding:4px 10px;cursor:pointer}
.world-list{display:grid;gap:14px;padding-bottom:1rem}
.world-card{border:1.5px solid #E8E6F8;border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s}
.world-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(83,74,183,.1)}
.world-card.locked{opacity:.45;cursor:default;pointer-events:none}
.world-header{padding:1rem 1.25rem;display:flex;align-items:center;gap:12px}
.world-icon{font-size:2rem}
.world-info{flex:1}
.world-name{font-size:15px;font-weight:700;color:#2C2C2A}
.world-desc{font-size:12px;color:#888;margin-top:2px}
.world-progress{font-size:12px;font-weight:600;padding:2px 10px;border-radius:20px;white-space:nowrap}
.world-levels{padding:.75rem 1.25rem;background:#FAFAFA;border-top:1px solid #F1EFE8;display:flex;gap:6px;flex-wrap:wrap}
.level-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:1.5px solid #E8E6F8;color:#888;background:#fff}
.level-dot.done{background:#EAF3DE;border-color:#639922;color:#27500A}
.level-dot.unlocked{background:#EEEDFE;border-color:#7F77DD;color:#534AB7}
.level-dot.locked{background:#F1EFE8;color:#B4B2A9}
.back-btn{background:none;border:none;font-size:13px;color:#534AB7;cursor:pointer;padding:0 0 1rem;font-weight:600}
.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:.5rem 0}
.level-card{background:#fff;border:1.5px solid #E8E6F8;border-radius:14px;padding:1rem;cursor:pointer;transition:transform .15s;text-align:center}
.level-card:hover:not(.lc-locked){transform:translateY(-2px)}
.level-card.lc-locked{opacity:.45;cursor:default}
.level-card.lc-done{border-color:#639922}
.level-card.lc-unlocked{border-color:#7F77DD}
.lc-num{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.lc-name{font-size:12px;color:#5F5E5A;line-height:1.4}
.lc-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;margin-top:6px;font-weight:600}
.quiz-header{display:flex;align-items:center;justify-content:space-between;padding:0 0 1rem;border-bottom:1.5px solid #F1EFE8;margin-bottom:1.25rem}
.hearts{display:flex;gap:3px;font-size:20px}
.xp-badge{background:#EEEDFE;color:#534AB7;font-size:13px;font-weight:700;padding:4px 14px;border-radius:20px}
.timer-circle{position:relative;width:44px;height:44px}
.timer-svg{transform:rotate(-90deg)}
.timer-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;font-weight:700;color:#444}
.progress-wrap{margin-bottom:1.25rem}
.progress-label{font-size:11px;color:#888;margin-bottom:4px}
.progress-bar{height:8px;background:#F1EFE8;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#7F77DD,#D4537E);border-radius:4px;transition:width .35s}
.question-text{font-size:17px;font-weight:600;color:#2C2C2A;line-height:1.55;margin-bottom:1.5rem;min-height:80px}
.options{display:grid;gap:10px}
.option-btn{background:#fff;border:1.5px solid #E8E6F8;border-radius:12px;padding:13px 16px;text-align:left;font-size:14px;color:#2C2C2A;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:10px;width:100%}
.option-btn:hover:not(:disabled){border-color:#7F77DD;background:#EEEDFE;color:#3C3489}
.option-btn.correct{background:#EAF3DE;border-color:#639922;color:#27500A}
.option-btn.wrong{background:#FCEBEB;border-color:#A32D2D;color:#501313}
.option-btn:disabled{cursor:default}
.opt-letter{width:28px;height:28px;border-radius:50%;background:#F1EFE8;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;color:#5F5E5A}
.option-btn.correct .opt-letter{background:#639922;color:#fff}
.option-btn.wrong .opt-letter{background:#A32D2D;color:#fff}
.feedback{margin-top:1rem;padding:12px 16px;border-radius:10px;font-size:14px;font-weight:600}
.feedback.correct{background:#EAF3DE;color:#27500A}
.feedback.wrong{background:#FCEBEB;color:#501313}
.center-wrap{text-align:center;padding:2.5rem 1rem}
.big-icon{font-size:4.5rem;margin-bottom:1rem}
.result-title{font-size:24px;font-weight:700;color:#2C2C2A;margin-bottom:6px}
.result-sub{font-size:13px;color:#888;margin-bottom:1.5rem}
.score-display{font-size:3.5rem;font-weight:700;color:#534AB7;margin:.5rem 0}
.stars{font-size:2.2rem;margin:.25rem 0 1.25rem}
.xp-earned{display:inline-block;background:#EEEDFE;color:#534AB7;font-size:16px;font-weight:700;padding:8px 24px;border-radius:20px;margin-bottom:1rem}
.pass-badge{background:#EAF3DE;color:#27500A;font-size:13px;font-weight:700;padding:6px 16px;border-radius:20px;display:inline-block;margin-bottom:1rem}
.fail-badge{background:#FCEBEB;color:#501313;font-size:13px;font-weight:700;padding:6px 16px;border-radius:20px;display:inline-block;margin-bottom:1rem}
.btn-secondary{display:block;background:transparent;color:#534AB7;border:2px solid #534AB7;border-radius:12px;padding:13px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:10px;transition:background .15s}
.btn-secondary:hover{background:#EEEDFE}
.loading{text-align:center;padding:3rem;color:#888;font-size:14px}
/* RANKING */
.rank-header{text-align:center;padding:1rem 0 1.5rem}
.rank-title{font-size:20px;font-weight:700;color:#2C2C2A}
.rank-sub{font-size:13px;color:#888;margin-top:4px}
.rank-list{display:grid;gap:10px;padding-bottom:1rem}
.rank-card{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1.5px solid #E8E6F8;border-radius:14px;background:#fff}
.rank-card.me{border-color:#7F77DD;background:#EEEDFE}
.rank-card.gold{border-color:#EF9F27}
.rank-card.silver{border-color:#B4B2A9}
.rank-card.bronze{border-color:#D85A30}
.rank-pos{font-size:20px;width:32px;text-align:center;font-weight:700;color:#888;flex-shrink:0}
.rank-pos.gold{color:#BA7517}
.rank-pos.silver{color:#5F5E5A}
.rank-pos.bronze{color:#D85A30}
.rank-avatar{width:40px;height:40px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#534AB7;flex-shrink:0}
.rank-info{flex:1}
.rank-name{font-size:14px;font-weight:700;color:#2C2C2A}
.rank-detail{font-size:12px;color:#888;margin-top:2px}
.rank-xp{font-size:16px;font-weight:700;color:#534AB7}
.rank-card.me .rank-xp{color:#3C3489}
</style>
</head>
<body>
<div id="app">

  <div id="auth" class="screen active">
    <div class="auth-wrap">
      <div class="auth-header">
        <h1>17025 <span>Quest</span></h1>
        <div class="tagline">Belajar ISO/IEC 17025 dengan cara yang menyenangkan 🔬</div>
      </div>
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('login')">Masuk</button>
        <button class="tab-btn" onclick="switchTab('register')">Daftar</button>
      </div>
      <div id="loginForm">
        <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="email@contoh.com"></div>
        <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="Password"></div>
        <button class="btn-primary" onclick="doLogin()">Masuk</button>
      </div>
      <div id="registerForm" style="display:none">
        <div class="field"><label>Nama</label><input type="text" id="regName" placeholder="Nama lengkap"></div>
        <div class="field"><label>Email</label><input type="email" id="regEmail" placeholder="email@contoh.com"></div>
        <div class="field"><label>Password</label><input type="password" id="regPassword" placeholder="Minimal 6 karakter"></div>
        <button class="btn-primary" onclick="doRegister()">Daftar</button>
      </div>
      <div class="auth-msg" id="authMsg"></div>
    </div>
  </div>

  <div id="home" class="screen">
    <div class="home-header">
      <h1>17025 <span>Quest</span></h1>
      <div class="tagline">Pilih dunia untuk mulai belajar</div>
    </div>
    <div class="user-bar">
      <div class="user-name" id="userName"></div>
      <button class="logout-btn" onclick="doLogout()">Keluar</button>
    </div>
    <div class="nav-row">
      <button class="nav-btn active" onclick="showTab('worlds')">🗺️ Peta Dunia</button>
      <button class="nav-btn" onclick="showTab('ranking')">🏆 Ranking</button>
    </div>
    <div id="tabWorlds">
      <div class="world-list" id="worldList"><div class="loading">Memuat...</div></div>
    </div>
    <div id="tabRanking" style="display:none">
      <div class="rank-header">
        <div class="rank-title">🏆 Papan Peringkat</div>
        <div class="rank-sub">Berdasarkan total XP terkumpul</div>
      </div>
      <div class="rank-list" id="rankList"><div class="loading">Memuat...</div></div>
    </div>
  </div>

  <div id="levelSelect" class="screen">
    <button class="back-btn" onclick="showScreen('home')">← Kembali</button>
    <div id="levelSelectHeader"></div>
    <div class="level-grid" id="levelGrid"></div>
  </div>

  <div id="quiz" class="screen">
    <div class="quiz-header">
      <div class="hearts" id="hearts"></div>
      <div class="timer-circle">
        <svg class="timer-svg" width="44" height="44" viewBox="0 0 44 44">
          <circle cx="22" cy="22" r="18" fill="none" stroke="#E8E6F8" stroke-width="3.5"/>
          <circle id="timerArc" cx="22" cy="22" r="18" fill="none" stroke="#534AB7" stroke-width="3.5" stroke-dasharray="113.1" stroke-dashoffset="0" stroke-linecap="round"/>
        </svg>
        <div class="timer-num" id="timerNum">15</div>
      </div>
      <div class="xp-badge" id="xpBadge">0 XP</div>
    </div>
    <div class="progress-wrap">
      <div class="progress-label" id="questionNum">Soal 1 dari 10</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback" style="display:none"></div>
  </div>

  <div id="gameover" class="screen">
    <div class="center-wrap">
      <div class="big-icon">💔</div>
      <div class="result-title">Hati habis!</div>
      <div class="result-sub" id="gameoverSub"></div>
      <button class="btn-primary" onclick="retryLevel()">Coba Lagi</button>
      <button class="btn-secondary" onclick="showScreen('levelSelect')">Pilih Level Lain</button>
    </div>
  </div>

  <div id="result" class="screen">
    <div class="center-wrap">
      <div class="big-icon" id="resultIcon"></div>
      <div class="result-title" id="resultTitle"></div>
      <div class="score-display" id="resultScore"></div>
      <div class="stars" id="resultStars"></div>
      <div id="resultBadge"></div>
      <div class="xp-earned" id="resultXP"></div>
      <div class="result-sub" id="resultSub"></div>
      <button class="btn-primary" onclick="retryLevel()">Main Lagi</button>
      <button class="btn-secondary" onclick="showScreen('levelSelect')">Pilih Level Lain</button>
      <button class="btn-secondary" style="margin-top:6px" onclick="showScreen('home')">Peta Dunia</button>
    </div>
  </div>

</div>
<script>
const SUPABASE_URL='https://omvoqbctacdkwyjbzknx.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9tdm9xYmN0YWNka3d5amJ6a254Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MzUwNjcsImV4cCI6MjA5NzQxMTA2N30.2dh5DFKtWBqaTxH3dx9HVZl6IePq52FPvzDTj-8UBe4';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

const WORLD_COLORS=['#534AB7','#1D9E75','#5F5E5A','#D85A30','#D4537E','#378ADD','#639922'];
const WORLD_BG=['#EEEDFE','#E1F5EE','#F1EFE8','#FAECE7','#FBEAF0','#E6F1FB','#EAF3DE'];

let currentUser=null,worlds=[],allLevels=[],allProgress=[];
let currentWorld=null,currentLevel=null,currentWorldIndex=0;
let shuffledQuestions=[],currentQ=0,hearts=5,xp=0,correct=0;
let timerVal=15,timerInterval=null,answered=false;

// AUTH
function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('loginForm').style.display=tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display=tab==='register'?'block':'none';
  setAuthMsg('','');
}
function setAuthMsg(msg,type){const el=document.getElementById('authMsg');el.textContent=msg;el.className='auth-msg '+(type||'');}

async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPassword').value;
  if(!email||!pass){setAuthMsg('Isi email dan password.','error');return;}
  setAuthMsg('Memproses...','');
  const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error){setAuthMsg(error.message,'error');return;}
  currentUser=data.user;await afterLogin();
}

async function doRegister(){
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const pass=document.getElementById('regPassword').value;
  if(!name||!email||!pass){setAuthMsg('Semua kolom wajib diisi.','error');return;}
  if(pass.length<6){setAuthMsg('Password minimal 6 karakter.','error');return;}
  setAuthMsg('Mendaftar...','');
  const {error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  if(error){setAuthMsg(error.message,'error');return;}
  setAuthMsg('Berhasil! Silakan masuk.','success');switchTab('login');
}

async function doLogout(){
  await sb.auth.signOut();
  currentUser=null;worlds=[];allLevels=[];allProgress=[];
  showScreen('auth');
}

async function afterLogin(){
  document.getElementById('userName').textContent='👋 '+(currentUser.user_metadata?.full_name||currentUser.email);
  await loadData();showScreen('home');
}

// DATA
async function loadData(){
  const [w,l,p]=await Promise.all([
    sb.from('worlds').select('*').order('order_num'),
    sb.from('levels').select('*').order('order_num'),
    sb.from('user_progress').select('*').eq('user_id',currentUser.id)
  ]);
  worlds=w.data||[];allLevels=l.data||[];allProgress=p.data||[];
  renderHome();
}

function getProgress(levelId){return allProgress.find(p=>p.level_id===levelId)||null;}
function getLevelsForWorld(worldId){return allLevels.filter(l=>l.world_id===worldId);}

function passingScore(level){return level.order_num===5?12:8;}

function isWorldUnlocked(wi){
  if(wi===0)return true;
  const prev=worlds[wi-1];
  const prevLevels=getLevelsForWorld(prev.id);
  const activePrev=prevLevels.filter(l=>l.is_active);
  if(activePrev.length===0)return false;
  return activePrev.every(l=>{const p=getProgress(l.id);return p&&p.best_score>=passingScore(l);});
}

function isLevelUnlocked(level,worldLevels){
  if(level.order_num===1)return level.is_active;
  const prev=worldLevels.find(l=>l.order_num===level.order_num-1);
  if(!prev)return level.is_active;
  const p=getProgress(prev.id);
  return p&&p.best_score>=passingScore(prev);
}

function getTotalXP(){
  return allProgress.reduce((sum,p)=>sum+(p.best_score*10),0);
}

function getLevelsCompleted(){
  return allProgress.filter(p=>p.best_score>=8).length;
}

// HOME TABS
function showTab(tab){
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='worlds')||(i===1&&tab==='ranking')));
  document.getElementById('tabWorlds').style.display=tab==='worlds'?'block':'none';
  document.getElementById('tabRanking').style.display=tab==='ranking'?'block':'none';
  if(tab==='ranking')loadRanking();
}

// RANKING
async function loadRanking(){
  const list=document.getElementById('rankList');
  list.innerHTML='<div class="loading">Memuat ranking...</div>';

  // Get all user progress
  const {data:allProg}=await sb.from('user_progress').select('user_id,best_score');
  if(!allProg||allProg.length===0){list.innerHTML='<div class="loading">Belum ada data ranking.</div>';return;}

  // Aggregate XP per user
  const userXP={};
  allProg.forEach(p=>{
    userXP[p.user_id]=(userXP[p.user_id]||0)+(p.best_score*10);
  });

  // Get user metadata from auth
  const userIds=Object.keys(userXP);
  const {data:profiles}=await sb.from('user_progress')
    .select('user_id')
    .in('user_id',userIds);

  // Build ranking with names from auth metadata
  // We can only get current user's name; others show anonymized
  const sorted=Object.entries(userXP)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,20);

  list.innerHTML='';
  sorted.forEach(([uid,totalXp],i)=>{
    const isMe=uid===currentUser.id;
    const name=isMe?(currentUser.user_metadata?.full_name||currentUser.email):`Pemain ${i+1}`;
    const pos=i+1;
    const medal=pos===1?'🥇':pos===2?'🥈':pos===3?'🥉':'';
    const posClass=pos===1?'gold':pos===2?'silver':pos===3?'bronze':'';
    const levDone=isMe?getLevelsCompleted():'—';
    const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const card=document.createElement('div');
    card.className='rank-card'+(isMe?' me':'')+(posClass?' '+posClass:'');
    card.innerHTML=`
      <div class="rank-pos ${posClass}">${medal||pos}</div>
      <div class="rank-avatar">${initials}</div>
      <div class="rank-info">
        <div class="rank-name">${name}${isMe?' (Kamu)':''}</div>
        <div class="rank-detail">${isMe?levDone+' level selesai':'—'}</div>
      </div>
      <div class="rank-xp">${totalXp} XP</div>`;
    list.appendChild(card);
  });
}

// HOME
function renderHome(){
  const list=document.getElementById('worldList');
  list.innerHTML='';
  worlds.forEach((world,wi)=>{
    const levels=getLevelsForWorld(world.id);
    const activeLevels=levels.filter(l=>l.is_active);
    const done=activeLevels.filter(l=>{const p=getProgress(l.id);return p&&p.best_score>=8;});
    const locked=!isWorldUnlocked(wi);
    const color=WORLD_COLORS[wi]||'#534AB7';
    const bg=WORLD_BG[wi]||'#EEEDFE';
    const card=document.createElement('div');
    card.className='world-card'+(locked?' locked':'');
    card.style.borderTop=`3px solid ${color}`;
    const dots=levels.map(l=>{
      const p=getProgress(l.id);
      const isDone=p&&p.best_score>=8;
      const isUnlocked=!locked&&isLevelUnlocked(l,levels);
      const cls=isDone?'done':isUnlocked?'unlocked':'locked';
      return `<div class="level-dot ${cls}" title="${l.name}">${isDone?'✓':l.order_num}</div>`;
    }).join('');
    card.innerHTML=`
      <div class="world-header">
        <div class="world-icon">${world.icon||'📚'}</div>
        <div class="world-info">
          <div class="world-name">${locked?'🔒 ':''}${world.name}</div>
          <div class="world-desc">${world.description||''}</div>
        </div>
        <div class="world-progress" style="background:${bg};color:${color}">${done.length}/${activeLevels.length}</div>
      </div>
      <div class="world-levels">${dots}</div>`;
    if(!locked)card.onclick=()=>openWorld(world,wi);
    list.appendChild(card);
  });
}

// LEVEL SELECT
function openWorld(world,wi){
  currentWorld=world;currentWorldIndex=wi;
  const color=WORLD_COLORS[wi]||'#534AB7';
  const levels=getLevelsForWorld(world.id);
  document.getElementById('levelSelectHeader').innerHTML=`
    <div style="text-align:center;padding:.5rem 0 1.25rem">
      <div style="font-size:2.5rem">${world.icon||'📚'}</div>
      <div style="font-size:18px;font-weight:700;color:#2C2C2A;margin-top:6px">${world.name}</div>
      <div style="font-size:12px;color:#888;margin-top:4px">${world.description||''}</div>
    </div>`;
  const grid=document.getElementById('levelGrid');
  grid.innerHTML='';
  levels.forEach(level=>{
    const p=getProgress(level.id);
    const done=p&&p.best_score>=8;
    const unlocked=isLevelUnlocked(level,levels);
    const hasQuestions=level.is_active;
    const card=document.createElement('div');
    card.className='level-card '+(done?'lc-done':unlocked&&hasQuestions?'lc-unlocked':'lc-locked');
    const stars=done?(p.best_score>=10?'⭐⭐⭐':p.best_score>=9?'⭐⭐':'⭐'):'';
    const badgeTxt=done?`${stars} ${p.best_score}/10`:unlocked&&hasQuestions?'Mulai →':unlocked&&!hasQuestions?'Segera hadir':'🔒';
    const badgeBg=done?'#EAF3DE':unlocked&&hasQuestions?'#EEEDFE':'#F1EFE8';
    const badgeColor=done?'#27500A':unlocked&&hasQuestions?color:'#888';
    card.innerHTML=`
      <div class="lc-num" style="color:${color}">Level ${level.order_num}</div>
      <div class="lc-name">${level.name}</div>
      <div class="lc-badge" style="background:${badgeBg};color:${badgeColor}">${badgeTxt}</div>`;
    if(unlocked&&hasQuestions)card.onclick=()=>startLevel(level);
    grid.appendChild(card);
  });
  showScreen('levelSelect');
}

// QUIZ
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function getLevelConfig(level){
  // Boss quiz levels: order_num 5 in any world = 15 soal, passing 12
  if(level.order_num===5){return{maxQ:15,passing:12};}
  return{maxQ:10,passing:8};
}

async function startLevel(level){
  currentLevel=level;currentQ=0;hearts=5;xp=0;correct=0;
  const cfg=getLevelConfig(level);
  const {data}=await sb.from('questions').select('*').eq('level_id',level.id);
  if(!data||data.length===0){alert('Soal belum tersedia untuk level ini.');return;}
  const picked=shuffle(data).slice(0,cfg.maxQ);
  shuffledQuestions=picked.map(q=>{
    const opts=[...q.options];
    const correctOpt=opts[q.correct_index];
    const shuffledOpts=shuffle(opts);
    return{...q,options:shuffledOpts,correct_index:shuffledOpts.indexOf(correctOpt)};
  });
  showScreen('quiz');renderQuestion();
}

function renderHearts(){document.getElementById('hearts').innerHTML=Array.from({length:5},(_,i)=>i<hearts?'❤️':'🤍').join('');}

function renderQuestion(){
  const q=shuffledQuestions[currentQ];
  answered=false;
  document.getElementById('questionNum').textContent=`Soal ${currentQ+1} dari ${shuffledQuestions.length}`;
  document.getElementById('questionText').textContent=q.question;
  document.getElementById('progressFill').style.width=`${(currentQ/shuffledQuestions.length)*100}%`;
  document.getElementById('xpBadge').textContent=`${xp} XP`;
  document.getElementById('feedback').style.display='none';
  renderHearts();
  const opts=document.getElementById('options');
  opts.innerHTML='';
  ['A','B','C','D'].forEach((letter,i)=>{
    if(i>=q.options.length)return;
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="opt-letter">${letter}</span>${q.options[i]}`;
    btn.onclick=()=>selectAnswer(i);
    opts.appendChild(btn);
  });
  startTimer();
}

function startTimer(){
  clearInterval(timerInterval);timerVal=15;updateTimerUI();
  timerInterval=setInterval(()=>{timerVal--;updateTimerUI();if(timerVal<=0){clearInterval(timerInterval);timeUp();}},1000);
}

function updateTimerUI(){
  document.getElementById('timerNum').textContent=timerVal;
  const arc=document.getElementById('timerArc');
  arc.style.strokeDashoffset=113.1*(1-timerVal/15);
  arc.style.stroke=timerVal<=5?'#E24B4A':'#534AB7';
}

function timeUp(){
  if(answered)return;
  answered=true;hearts--;renderHearts();
  showFeedback(false,null,true);disableOptions();
  if(hearts<=0){setTimeout(showGameOver,1300);return;}
  setTimeout(nextQuestion,1600);
}

function selectAnswer(idx){
  if(answered)return;
  answered=true;clearInterval(timerInterval);
  const q=shuffledQuestions[currentQ];
  const isCorrect=idx===q.correct_index;
  const btns=document.querySelectorAll('.option-btn');
  btns[idx].classList.add(isCorrect?'correct':'wrong');
  if(!isCorrect)btns[q.correct_index].classList.add('correct');
  disableOptions();
  if(isCorrect){xp+=10;correct++;showFeedback(true,null,false);}
  else{hearts--;renderHearts();showFeedback(false,q.options[q.correct_index],false);}
  document.getElementById('xpBadge').textContent=`${xp} XP`;
  if(hearts<=0){setTimeout(showGameOver,1300);return;}
  setTimeout(nextQuestion,1600);
}

function showFeedback(isCorrect,correctAnswer,isTimeout){
  const fb=document.getElementById('feedback');
  fb.style.display='block';
  if(isCorrect){fb.className='feedback correct';fb.textContent='✅ Benar! +10 XP';}
  else if(isTimeout){fb.className='feedback wrong';fb.textContent='⏰ Waktu habis! Hati berkurang.';}
  else{fb.className='feedback wrong';fb.textContent=`❌ Jawaban benar: ${correctAnswer}`;}
}

function disableOptions(){document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);}
function nextQuestion(){currentQ++;if(currentQ>=shuffledQuestions.length){showResult();return;}renderQuestion();}

function showGameOver(){
  clearInterval(timerInterval);
  document.getElementById('gameoverSub').textContent=`Soal ${currentQ+1} • ${correct} jawaban benar`;
  showScreen('gameover');
}

async function showResult(){
  clearInterval(timerInterval);
  const cfg=getLevelConfig(currentLevel);
  const passing=cfg.passing;
  const maxQ=cfg.maxQ;
  const passed=correct>=passing;
  const pct=correct/maxQ;
  const stars=correct>=maxQ?'⭐⭐⭐':pct>=0.9?'⭐⭐':correct>=passing?'⭐':'';
  const icon=pct>=0.9?'🎉':correct>=passing?'👍':pct>=0.5?'📚':'💪';
  const msg=pct>=0.9?'Luar biasa!':correct>=passing?'Level selesai!':pct>=0.5?'Hampir! Coba lagi.':'Terus belajar!';
  document.getElementById('resultIcon').textContent=icon;
  document.getElementById('resultTitle').textContent=msg;
  document.getElementById('resultScore').textContent=`${correct}/${maxQ}`;
  document.getElementById('resultStars').textContent=stars;
  document.getElementById('resultXP').textContent=`+${xp} XP diperoleh`;
  document.getElementById('resultSub').textContent=currentLevel.name;
  document.getElementById('resultBadge').innerHTML=passed
    ?`<div class="pass-badge">✅ Level selesai! Level berikutnya terbuka</div>`
    :`<div class="fail-badge">Butuh ${passing}/${maxQ} untuk lanjut. Semangat!</div>`;
  await saveProgress(correct,passed,passing);
  await loadData();
  showScreen('result');
}

async function saveProgress(score,completed,passing){
  const existing=getProgress(currentLevel.id);
  const bestScore=existing?Math.max(existing.best_score,score):score;
  const pass=passing||8;
  await sb.from('user_progress').upsert({
    user_id:currentUser.id,
    level_id:currentLevel.id,
    best_score:bestScore,
    completed:bestScore>=pass||(existing?.completed||false)
  },{onConflict:'user_id,level_id'});
}

function retryLevel(){startLevel(currentLevel);}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(session){currentUser=session.user;await afterLogin();}
})();
</script>
